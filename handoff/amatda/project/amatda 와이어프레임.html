<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>amatda — 와이어프레임</title>
<style>
  html, body { margin: 0; height: 100%; background: #efece3; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wireframe-ui.jsx"></script>
<script type="text/babel" src="screens-core.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-flow.jsx"></script>

<script type="text/babel">
const AW = 322, AH = 686;
function Board({ id, label, Comp }) {
  return (
    <DCArtboard id={id} label={label} width={AW} height={AH}>
      <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: 8, background: '#efece3' }}>
        <Comp/>
      </div>
    </DCArtboard>
  );
}
// DCSection only recognizes DIRECT <DCArtboard> children, so expand Board → DCArtboard here.
const board = (id, label, Comp) => (
  <DCArtboard key={id} id={id} label={label} width={AW} height={AH}>
    <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', paddingTop: 8, background: '#efece3' }}>
      <Comp/>
    </div>
  </DCArtboard>
);

function App() {
  return (
    <DesignCanvas>
      <DCSection id="entry" title="진입 — 온보딩 · 로그인 · 권한" subtitle="최초 실행 → 로그인 → 권한 요청까지의 첫 흐름">
        {board('onb1', '온보딩 ① 스티커', Onb1)}
        {board('onb2', '온보딩 ② 출발 감지', Onb2)}
        {board('onb3', '온보딩 ③ 도착 구매', Onb3)}
        {board('login', '소셜 로그인', Login)}
        {board('perm', '권한 요청', Permission)}
      </DCSection>

      <DCSection id="home" title="홈 — 내 가방 (확정)" subtitle="내 가방 리스트 → 행을 탭하면 지도 상세로. 하단 탭 = 내 가방">
        {board('homeList', '내 가방 리스트 (홈)', HomeList)}
        {board('homeEmpty', '내 가방 · 빈 상태 (첫 실행)', HomeEmpty)}
        {board('homePerm', '내 가방 · 위치 권한 거부', HomePermBlocked)}
        {board('bagMap', '가방 상세 · 떠날 때 탭', BagMap)}
        {board('bagArrive', '가방 상세 · 도착할 때 탭', BagMapArrive)}
        {board('bagMenu', '가방 상세 · ⋯ 가방 메뉴', BagMapMenu)}
        {board('bagEdit', '가방 편집 · 이름·이모지 변경', BagEditSheet)}
        {board('itemMenu', '챙길 것 ⋯ 메뉴 (편집·빼기)', ItemActionMenu)}
        {board('itemSheet', '챙길 것 편집 바텀시트', ItemEditSheet)}
        {board('itemAdd', '챙길 것 담기 (내 챙길 것에서)', ItemAddPicker)}
        {board('itemAddNew', '담기 · 새 소지품 인라인 생성', ItemAddCreate)}
        {board('itemAdded', '담기 · 추가 직후 (선택된 채 등장)', ItemAddCreated)}
        {board('locPicker', '위치 설정 (전체화면 지도)', LocationPicker)}
      </DCSection>

      <DCSection id="set" title="가방 생성 (= 빈 상세)" subtitle="생성은 상세와 같은 레이아웃. 빈 상태 → 작성 중 두 장">
        {board('createNew', '생성 ① 빈 상태', BagCreate)}
        {board('createName', '생성 ① · 이름·이모지 입력(포커스)', BagCreateName)}
        {board('createFill', '생성 ② 작성 중 · 만들 준비', BagCreateFilled)}
      </DCSection>

      <DCSection id="noti" title="알림 — 출발 감지 · 체크리스트" subtitle="출발 감지 푸시 → 위치 그리드 체크리스트(C)">
        {board('push', '출발 감지 푸시', DepartPush)}
        {board('checkC', '체크리스트 C · 위치 그리드', ChecklistC)}
      </DCSection>

      <DCSection id="pay" title="구독 — 페이월 · 플랜 선택" subtitle="가방 3개째 시도 시 페이월(A) → 플랜 선택(풀스크린 모달) · 헤드라인은 진입 상태로 분기">
        {board('paywallAFull', '페이월 A · 2개 꽉 채운 유저 (투자심리)', PaywallAFull)}
        {board('paywallAGen', '페이월 A · 빈 가방·다른 진입 (한도 안내)', PaywallAGeneric)}
        {board('plan', '플랜 선택 (모달)', PlanSelect)}
      </DCSection>

      <DCSection id="settings" title="설정 탭" subtitle="계정 · 권한 상태 · 구독 관리 · 약관">
        {board('settings1', '설정', Settings)}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
